name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: |
        I tried to ...
        I expected ...
        Instead ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the issue.
      placeholder: |
        1. Go to /search
        2. Type "..."
        3. Click ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OwnTube version / commit
      placeholder: v0.1.0 or commit hash
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v22.x
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Video source
      options:
        - Public Piped instance
        - Public Invidious instance
        - Self-hosted Invidious
        - Self-hosted Piped
        - Both Piped and Invidious
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: PIPED_BASE_URL / INVIDIOUS_BASE_URL
      description: Just the URLs you're using (no secrets).
      placeholder: |
        PIPED_BASE_URL=disabled
        INVIDIOUS_BASE_URL=http://localhost:3001

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `LOG_LEVEL=debug` and paste any relevant output here.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched the existing issues
          required: true
        - label: I am not running an outdated commit
          required: true
