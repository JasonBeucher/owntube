services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /app/data/owntube.db
      PIPED_BASE_URL: ${PIPED_BASE_URL:-https://pipedapi.kavin.rocks}
      INVIDIOUS_BASE_URL: ${INVIDIOUS_BASE_URL:-}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - owntube-data:/app/data

volumes:
  owntube-data:
